<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ServiceMe Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222536;
      --border: #2d3148;
      --text: #e8eaf6;
      --muted: #8b92b8;
      --primary: #6c8bff;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 10px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Login ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 40px; width: 100%; max-width: 380px;
    }
    .login-card h1 { font-size: 22px; margin-bottom: 6px; }
    .login-card p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; letter-spacing: .5px; }
    .field input {
      width: 100%; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 15px; outline: none;
    }
    .field input:focus { border-color: var(--primary); }
    .field { margin-bottom: 18px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 11px 20px;
      border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: #fff; width: 100%; justify-content: center; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .error-msg { color: var(--danger); font-size: 13px; margin-top: 10px; text-align: center; }

    /* ── Dashboard ── */
    #dashboard { display: none; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px; background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-logo { font-size: 18px; font-weight: 700; color: var(--primary); }
    .topbar-sub { font-size: 13px; color: var(--muted); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .refresh-indicator { font-size: 12px; color: var(--muted); }

    .main { padding: 28px; max-width: 1100px; margin: 0 auto; }

    /* stats */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .stat-label { font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: .5px; margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 700; }
    .stat-value.pending { color: var(--warning); }
    .stat-value.verified { color: var(--success); }
    .stat-value.not-started { color: var(--muted); }

    /* tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
    .tab {
      padding: 8px 18px; border-radius: 6px; font-size: 14px; font-weight: 500;
      cursor: pointer; border: 1px solid transparent; background: transparent; color: var(--muted);
    }
    .tab.active { background: var(--surface); border-color: var(--border); color: var(--text); }
    .tab:hover:not(.active) { color: var(--text); }

    /* provider cards */
    .provider-list { display: flex; flex-direction: column; gap: 16px; }
    .provider-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; transition: border-color .15s;
    }
    .provider-card.pending { border-left: 3px solid var(--warning); }
    .provider-card.verified { border-left: 3px solid var(--success); }
    .provider-card.not-started { border-left: 3px solid var(--muted); }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .card-name { font-size: 16px; font-weight: 700; }
    .card-meta { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
    }
    .badge.pending { background: rgba(245,158,11,.15); color: var(--warning); }
    .badge.verified { background: rgba(34,197,94,.15); color: var(--success); }
    .badge.not-started { background: rgba(139,146,184,.15); color: var(--muted); }

    .card-details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 20px; margin-bottom: 14px; }
    .detail-item { font-size: 13px; }
    .detail-label { color: var(--muted); font-size: 11px; font-weight: 600; letter-spacing: .4px; margin-bottom: 2px; }

    .docs-section { margin-bottom: 16px; }
    .docs-title { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .5px; margin-bottom: 8px; }
    .docs-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .doc-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 6px; font-size: 12px;
      border: 1px solid var(--border);
    }
    .doc-chip.uploaded { border-color: rgba(34,197,94,.4); color: var(--success); background: rgba(34,197,94,.08); }
    .doc-chip.missing { color: var(--muted); }

    .submitted-at { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
    .rejection-note { 
      font-size: 13px; color: var(--danger); background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.2); border-radius: 6px; padding: 10px 12px; margin-bottom: 12px;
    }

    .card-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .reject-input {
      flex: 1; min-width: 200px; padding: 9px 12px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px;
    }
    .reject-input:focus { outline: none; border-color: var(--danger); }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-state p { font-size: 15px; margin-top: 8px; }

    @media (max-width: 700px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .card-details { grid-template-columns: 1fr; }
      .main { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h1>ServiceMe Admin</h1>
    <p>Sign in to review provider verifications</p>
    <div class="field">
      <label>ADMIN PASSWORD</label>
      <input type="password" id="password-input" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()" />
    </div>
    <button class="btn btn-primary" onclick="login()" id="login-btn">Sign In</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">ServiceMe</span>
      <span class="topbar-sub">Provider Admin</span>
    </div>
    <div class="topbar-right">
      <span class="refresh-indicator" id="refresh-text">Auto-refreshes every 30s</span>
      <button class="btn btn-ghost" onclick="loadProviders()">Refresh</button>
      <button class="btn btn-ghost" onclick="signOut()">Sign Out</button>
    </div>
  </div>

  <div class="main">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">TOTAL PROVIDERS</div>
        <div class="stat-value" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">PENDING REVIEW</div>
        <div class="stat-value pending" id="stat-pending">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">VERIFIED</div>
        <div class="stat-value verified" id="stat-verified">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">NOT STARTED</div>
        <div class="stat-value not-started" id="stat-not-started">0</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="setTab('all')" id="tab-all">All</button>
      <button class="tab" onclick="setTab('pending')" id="tab-pending">Pending</button>
      <button class="tab" onclick="setTab('verified')" id="tab-verified">Verified</button>
      <button class="tab" onclick="setTab('not_started')" id="tab-not-started">Not Started</button>
    </div>

    <div class="provider-list" id="provider-list">
      <div class="empty-state"><p>Loading providers...</p></div>
    </div>
  </div>
</div>

<script>
  let token = localStorage.getItem("sm_admin_token") || "";
  let allProviders = [];
  let currentTab = "all";
  let refreshTimer = null;

  const DOC_LABELS = {
    photoId: "Photo ID",
    selfie: "Selfie",
    businessLicense: "Business License",
    ownerId: "Owner ID",
    insurance: "Insurance",
  };

  const REQUIRED_DOCS = {
    independent: ["photoId", "selfie"],
    shop: ["businessLicense", "ownerId", "insurance"],
  };

  function getBase() {
    return window.location.origin;
  }

  async function login() {
    const password = document.getElementById("password-input").value;
    const btn = document.getElementById("login-btn");
    const err = document.getElementById("login-error");
    if (!password) { err.textContent = "Please enter the admin password."; return; }
    btn.disabled = true;
    btn.textContent = "Signing in...";
    err.textContent = "";
    try {
      const res = await fetch(`${getBase()}/api/admin/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password }),
      });
      const data = await res.json();
      if (!res.ok) { err.textContent = data.error || "Invalid password."; return; }
      token = data.token;
      localStorage.setItem("sm_admin_token", token);
      showDashboard();
    } catch {
      err.textContent = "Could not reach the server. Try again.";
    } finally {
      btn.disabled = false;
      btn.textContent = "Sign In";
    }
  }

  function signOut() {
    token = "";
    localStorage.removeItem("sm_admin_token");
    clearInterval(refreshTimer);
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("password-input").value = "";
  }

  function showDashboard() {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadProviders();
    clearInterval(refreshTimer);
    refreshTimer = setInterval(loadProviders, 30000);
  }

  async function loadProviders() {
    document.getElementById("refresh-text").textContent = "Refreshing...";
    try {
      const res = await fetch(`${getBase()}/api/admin/providers`, {
        headers: { "Authorization": `Bearer ${token}` },
      });
      if (res.status === 401) { signOut(); return; }
      allProviders = await res.json();
      updateStats();
      renderProviders();
    } catch {
      document.getElementById("provider-list").innerHTML = '<div class="empty-state"><p>Failed to load providers. Check your connection.</p></div>';
    } finally {
      const now = new Date().toLocaleTimeString();
      document.getElementById("refresh-text").textContent = `Last updated ${now}`;
    }
  }

  function updateStats() {
    document.getElementById("stat-total").textContent = allProviders.length;
    document.getElementById("stat-pending").textContent = allProviders.filter(p => p.verificationStatus === "pending").length;
    document.getElementById("stat-verified").textContent = allProviders.filter(p => p.verificationStatus === "verified").length;
    document.getElementById("stat-not-started").textContent = allProviders.filter(p => p.verificationStatus === "not_started").length;
  }

  function setTab(tab) {
    currentTab = tab;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(`tab-${tab.replace("_", "-")}`).classList.add("active");
    renderProviders();
  }

  function renderProviders() {
    const filtered = currentTab === "all"
      ? allProviders
      : allProviders.filter(p => p.verificationStatus === currentTab);

    const list = document.getElementById("provider-list");
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state"><p>No providers in this category.</p></div>';
      return;
    }

    list.innerHTML = filtered.map(p => buildCard(p)).join("");
  }

  function buildCard(p) {
    const status = p.verificationStatus || "not_started";
    const badgeLabel = status === "verified" ? "Verified" : status === "pending" ? "Pending Review" : "Not Started";
    const submittedDate = p.verificationSubmittedAt
      ? `Submitted ${new Date(p.verificationSubmittedAt).toLocaleString()}`
      : "";

    const requiredDocs = REQUIRED_DOCS[p.providerType] || REQUIRED_DOCS.independent;
    const docsHtml = requiredDocs.map(key => {
      const uploaded = p.verificationDocuments && p.verificationDocuments[key];
      return `<span class="doc-chip ${uploaded ? "uploaded" : "missing"}">${uploaded ? "&#10003;" : "&#x25cb;"} ${DOC_LABELS[key] || key}</span>`;
    }).join("");

    const rejectionNote = p.verificationNotes
      ? `<div class="rejection-note">Previous rejection note: ${escHtml(p.verificationNotes)}</div>` : "";

    const actionsHtml = status === "pending" ? `
      <input class="reject-input" id="note-${p.id}" placeholder="Rejection reason (optional)" />
      <button class="btn btn-success" onclick="approveProvider('${p.id}')">Approve</button>
      <button class="btn btn-danger" onclick="rejectProvider('${p.id}')">Reject</button>
    ` : status === "not_started" ? `
      <span style="font-size:13px;color:var(--muted)">Awaiting document submission</span>
    ` : `
      <button class="btn btn-danger" onclick="revokeProvider('${p.id}')">Revoke Verification</button>
    `;

    return `
      <div class="provider-card ${status}" id="card-${p.id}">
        <div class="card-header">
          <div>
            <div class="card-name">${escHtml(p.name)}</div>
            <div class="card-meta">${escHtml(p.email)} &bull; ${escHtml(p.phone || "No phone")} &bull; ${p.providerType === "shop" ? "Business / Shop" : "Independent"}</div>
          </div>
          <span class="badge ${status}">${badgeLabel}</span>
        </div>

        <div class="card-details">
          <div class="detail-item">
            <div class="detail-label">VEHICLE</div>
            ${escHtml(p.vehicleMake || "—")} ${escHtml(p.vehicleModel || "")} &bull; ${escHtml(p.licensePlate || "No plate")}
          </div>
          <div class="detail-item">
            <div class="detail-label">SERVICES</div>
            ${(p.servicesOffered || []).map(s => s.replace(/_/g," ")).join(", ") || "None"}
          </div>
          <div class="detail-item">
            <div class="detail-label">RATING</div>
            ${p.rating ? `${p.rating.toFixed(1)} (${p.reviewCount} reviews)` : "No reviews yet"}
          </div>
        </div>

        <div class="docs-section">
          <div class="docs-title">DOCUMENTS</div>
          <div class="docs-list">${docsHtml}</div>
        </div>

        ${submittedDate ? `<div class="submitted-at">${submittedDate}</div>` : ""}
        ${rejectionNote}

        <div class="card-actions">${actionsHtml}</div>
      </div>
    `;
  }

  async function approveProvider(id) {
    if (!confirm("Approve this provider? They will be marked as ID Verified.")) return;
    try {
      const res = await fetch(`${getBase()}/api/admin/providers/${id}/approve`, {
        method: "POST",
        headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
      });
      if (!res.ok) throw new Error();
      await loadProviders();
    } catch {
      alert("Failed to approve provider. Try again.");
    }
  }

  async function rejectProvider(id) {
    const noteInput = document.getElementById(`note-${id}`);
    const notes = noteInput ? noteInput.value.trim() : "";
    if (!confirm("Reject this provider? Their documents will be cleared and they will need to resubmit.")) return;
    try {
      const res = await fetch(`${getBase()}/api/admin/providers/${id}/reject`, {
        method: "POST",
        headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({ notes }),
      });
      if (!res.ok) throw new Error();
      await loadProviders();
    } catch {
      alert("Failed to reject provider. Try again.");
    }
  }

  async function revokeProvider(id) {
    if (!confirm("Revoke this provider's verification? They will need to resubmit documents.")) return;
    try {
      const res = await fetch(`${getBase()}/api/admin/providers/${id}/reject`, {
        method: "POST",
        headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({ notes: "Verification revoked by admin. Please resubmit your documents." }),
      });
      if (!res.ok) throw new Error();
      await loadProviders();
    } catch {
      alert("Failed to revoke verification. Try again.");
    }
  }

  function escHtml(str) {
    if (!str) return "";
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // Auto-login if token exists
  if (token) { showDashboard(); }
</script>
</body>
</html>
